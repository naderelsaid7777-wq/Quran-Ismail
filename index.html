<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صدقة جارية | إسماعيل منصور عبد المطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: linear-gradient(rgba(0, 31, 63, 0.85), rgba(0, 31, 63, 0.85)), url('https://i.ibb.co/XkyYf7X9/image.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: #dfc27d;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            background: rgba(0, 31, 63, 0.5);
            width: 100%;
            border-bottom: 2px solid #dfc27d;
        }
        h1 { font-family: 'Amiri', serif; color: #dfc27d; font-size: 2.5rem; margin: 0; }
        .container { max-width: 600px; width: 90%; margin-top: 30px; }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(223, 194, 125, 0.3);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(5px);
        }
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: #001f3f;
            color: white;
            border: 1px solid #dfc27d;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>إسماعيل منصور عبد المطلب</h1>
        <p>اللهم اجعل القرآن العظيم ربيع قلبه ونور صدره</p>
    </div>
    <div class="container">
        <div class="card">
            <h2 style="color: #dfc27d;">المصحف المسموع</h2>
            <select id="audioSelect"><option>اختر السورة للاستماع</option></select>
            <audio id="audioPlayer" controls style="width: 100%; margin-top: 20px;"></audio>
        </div>
    </div>
</body>
</html>
